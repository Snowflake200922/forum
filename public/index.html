<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>论坛</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" class="logo" onclick="return navigate('home')"><span id="siteName">论坛</span></a>
        <button class="btn-link" onclick="toggleAdminPanel()" id="adminBtn">管理</button>
      </div>
      <div class="header-right">
        <div id="adminRenamePanel" class="admin-rename hidden">
          <input type="text" id="renameInput" class="form-input rename-input" placeholder="新名称" maxlength="50" />
          <button class="btn-primary btn-sm" onclick="renameSite()">改名</button>
          <button class="btn-secondary btn-sm" onclick="adminLogout()">退出管理</button>
        </div>
        <button class="btn-primary" onclick="showNewPostModal()">+ 发帖</button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="container" id="app">
    <!-- 帖子列表 -->
    <div id="view-home"></div>
    <!-- 帖子详情 -->
    <div id="view-post" class="hidden"></div>
  </main>

  <!-- 发帖弹窗 -->
  <div id="newPostModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>发布新帖</h2>
        <button class="btn-close" onclick="closeNewPostModal()">&times;</button>
      </div>
      <form id="newPostForm" onsubmit="submitNewPost(event)">
        <div class="form-group">
          <label for="postTitle">标题</label>
          <input type="text" id="postTitle" class="form-input" placeholder="输入帖子标题" required maxlength="100" />
        </div>
        <div class="form-group">
          <label for="postContent">内容</label>
          <textarea id="postContent" class="form-textarea" placeholder="写点什么..." rows="5" required></textarea>
        </div>
        <div class="form-group">
          <label for="postImage">配图（可选）</label>
          <input type="file" id="postImage" class="form-file" accept="image/*" />
          <div id="imagePreview" class="image-preview hidden">
            <img id="previewImg" alt="预览" />
            <button type="button" class="btn-remove-image" onclick="removeImage()">&times;</button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeNewPostModal()">取消</button>
          <button type="submit" class="btn-primary">发布</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 管理员登录弹窗 -->
  <div id="adminLoginModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event, 'adminLoginModal')">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>管理员登录</h2>
        <button class="btn-close" onclick="closeModal('adminLoginModal')">&times;</button>
      </div>
      <form id="adminLoginForm" onsubmit="adminLogin(event)">
        <div class="form-group">
          <label for="adminPassword">管理密码</label>
          <input type="password" id="adminPassword" class="form-input" placeholder="请输入管理密码" required />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeModal('adminLoginModal')">取消</button>
          <button type="submit" class="btn-primary">登录</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
